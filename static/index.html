<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inflx | AutoStream Agent</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Highlight.js for code styling if needed -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/atom-one-dark.min.css">
    <!-- Local Stylesheet -->
    <link rel="stylesheet" href="/static/style.css">
    
    <!-- Marked JS for parsing markdown to HTML -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="background-animation">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
        <div class="blob blob3"></div>
    </div>

    <div class="app-container">
        <header class="app-header">
            <div class="logo">
                <div class="logo-icon"></div>
                <h1>Inflx</h1>
            </div>
            <div class="status-badge">
                <span class="pulse"></span> Online
            </div>
        </header>

        <main class="chat-container" id="chat-container">
            <div class="message system-message glass-panel">
                <div class="avatar agent-avatar">IN</div>
                <div class="message-content">
                    <p>👋 Welcome to <strong>AutoStream</strong> support. I'm Inflx, your AI assistant. How can I help you today?</p>
                </div>
            </div>
        </main>

        <footer class="input-container glass-panel">
            <form id="chat-form">
                <input type="text" id="user-input" placeholder="Type your message here..." autocomplete="off" autofocus>
                <button type="submit" id="send-btn" title="Send message">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </form>
        </footer>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
